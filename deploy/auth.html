<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In · Rep Legend</title>
<!-- Firebase v9 compat (CDN) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #FF6B35; --bg: #000; --bg2: #0A0A0A; --bg3: #111; --bg4: #161616;
    --text: #FFF; --text2: #ABABAB; --text3: #555;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.13);
    --green: #30D158; --red: #FF375F;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font);
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* NAV */
  nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 1px solid var(--border); }
  .logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
  .logo-icon { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg,var(--accent),#C94A1A); display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-name { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
  .nav-back { font-size: 13px; color: var(--text2); text-decoration: none; }
  .nav-back:hover { color: var(--text); }

  /* MAIN */
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; position: relative; overflow: hidden; }
  .glow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 600px; height: 400px; background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 60%); pointer-events: none; }

  /* CARD */
  .card { width: 100%; max-width: 420px; position: relative; z-index: 1; }
  .card-head { text-align: center; margin-bottom: 32px; }
  .card-icon { font-size: 36px; margin-bottom: 14px; }
  .card-title { font-size: 26px; font-weight: 900; letter-spacing: -.7px; margin-bottom: 6px; }
  .card-sub { font-size: 14px; color: var(--text2); }

  /* Mode toggle */
  .mode-toggle { display: flex; background: var(--bg3); border: 1px solid var(--border); border-radius: 999px; padding: 3px; gap: 3px; margin-bottom: 28px; }
  .mode-btn { flex: 1; background: none; border: none; color: var(--text2); padding: 9px 0; border-radius: 999px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all .2s; }
  .mode-btn.on { background: rgba(255,255,255,0.1); color: var(--text); }

  /* Google button */
  .google-btn {
    width: 100%; padding: 13px 16px; border-radius: 12px;
    background: #fff; color: #1F1F1F; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font);
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background .15s, transform .1s; margin-bottom: 8px;
  }
  .google-btn:hover { background: #F5F5F5; transform: translateY(-1px); }
  .google-btn:active { transform: translateY(0); }
  .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .google-btn .g-spinner { width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #4285F4; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
  .google-btn.loading .g-spinner { display: block; }
  .google-btn.loading .g-text { display: none; }

  /* Divider */
  .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 12px; color: var(--text3); font-weight: 600; }

  /* Fields */
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  input[type=email], input[type=password], input[type=text] {
    width: 100%; padding: 13px 15px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 12px; color: var(--text); font-family: var(--font);
    font-size: 15px; outline: none; transition: border-color .2s;
  }
  input:focus { border-color: rgba(255,107,53,0.5); }
  input::placeholder { color: var(--text3); }

  /* Password strength */
  .pw-strength { display: flex; gap: 4px; margin-top: 7px; }
  .pw-seg { flex: 1; height: 3px; border-radius: 999px; background: var(--border); transition: background .3s; }
  .pw-seg.weak { background: var(--red); }
  .pw-seg.ok   { background: #FFD60A; }
  .pw-seg.strong { background: var(--green); }
  .pw-hint { font-size: 11px; color: var(--text3); margin-top: 5px; transition: color .3s; }

  /* Name row (signup only) */
  .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Submit */
  .submit-btn {
    width: 100%; padding: 15px; border-radius: 12px;
    background: var(--accent); color: #fff; border: none;
    font-size: 16px; font-weight: 700; cursor: pointer; font-family: var(--font);
    margin-top: 8px; transition: opacity .2s, transform .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  .submit-btn .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
  .submit-btn.loading .spinner { display: block; }
  .submit-btn.loading .btn-txt { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error / success */
  .msg { font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
  .msg.err { color: var(--red); }
  .msg.ok  { color: var(--green); }

  /* Forgot password */
  .forgot { display: block; text-align: right; font-size: 12px; color: var(--text3); text-decoration: none; margin-top: -8px; margin-bottom: 10px; }
  .forgot:hover { color: var(--text2); }

  /* Footer note */
  .terms-note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 18px; line-height: 1.6; }
  .terms-note a { color: var(--text2); }

  /* Reset mode */
  .reset-back { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text2); cursor: pointer; background: none; border: none; font-family: var(--font); margin-bottom: 20px; }
  .reset-back:hover { color: var(--text); }

  /* Success screen */
  .success { display: none; text-align: center; }
  .success-icon { font-size: 56px; margin-bottom: 16px; }
  .success-h { font-size: 24px; font-weight: 900; letter-spacing: -.5px; margin-bottom: 8px; }
  .success-sub { font-size: 15px; color: var(--text2); margin-bottom: 28px; }
  .success-btn { display: inline-block; background: var(--accent); color: #fff; padding: 14px 36px; border-radius: 999px; font-size: 15px; font-weight: 700; text-decoration: none; }

  @media (max-width: 480px) { .name-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <a class="logo" href="landing.html">
    <div class="logo-icon">⚡</div>
    <span class="logo-name">Rep Legend</span>
  </a>
  <a class="nav-back" href="landing.html">← Back</a>
</nav>

<main>
  <div class="glow"></div>
  <div class="card">

    <!-- SUCCESS -->
    <div class="success" id="success">
      <div class="success-icon">🌟</div>
      <div class="success-h" id="success-h">Welcome to Rep Legend!</div>
      <div class="success-sub" id="success-sub">Your account is ready. Let's get to work.</div>
      <a class="success-btn" id="success-link" href="rep-legend-app.html">Open the App →</a>
    </div>

    <!-- MAIN FORM -->
    <div id="auth-panel">
      <div class="card-head">
        <div class="card-icon">⚡</div>
        <div class="card-title" id="card-title">Welcome back</div>
        <div class="card-sub" id="card-sub">Sign in to your Rep Legend account</div>
      </div>

      <!-- Sign In / Sign Up toggle -->
      <div class="mode-toggle">
        <button class="mode-btn on" id="btn-signin" onclick="setMode('signin')">Sign In</button>
        <button class="mode-btn" id="btn-signup" onclick="setMode('signup')">Create Account</button>
      </div>

      <!-- Google -->
      <button class="google-btn" id="google-btn" onclick="googleSignIn()">
        <div class="g-spinner"></div>
        <span class="g-text" style="display:flex;align-items:center;gap:10px">
          <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.5 13.3l7.8 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.6-4.8 7.3l7.6 5.9c4.4-4.1 7-10.1 7-17.2z"/><path fill="#FBBC05" d="M10.3 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6L2.5 13.3A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.5 10.6l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2 1.4-4.7 2.2-7.6 2.2-6.3 0-11.7-4.2-13.7-9.9l-7.8 6C6.6 42.6 14.6 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
          <span id="google-label">Continue with Google</span>
        </span>
      </button>

      <div class="divider"><span>or</span></div>

      <!-- SIGN IN form -->
      <div id="form-signin">
        <div class="field">
          <label>Email</label>
          <input type="email" id="si-email" placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="si-pw" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitSignIn()">
          <a class="forgot" href="#" onclick="setMode('reset');return false">Forgot password?</a>
        </div>
        <button class="submit-btn" id="si-btn" onclick="submitSignIn()">
          <div class="spinner"></div>
          <span class="btn-txt">Sign In</span>
        </button>
      </div>

      <!-- SIGN UP form -->
      <div id="form-signup" style="display:none">
        <div class="name-row">
          <div class="field">
            <label>First name</label>
            <input type="text" id="su-fname" placeholder="Paolo" autocomplete="given-name">
          </div>
          <div class="field">
            <label>Last name</label>
            <input type="text" id="su-lname" placeholder="B." autocomplete="family-name">
          </div>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="su-email" placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="su-pw" placeholder="Min 8 characters" autocomplete="new-password" oninput="checkPwStrength(this.value)" onkeydown="if(event.key==='Enter')submitSignUp()">
          <div class="pw-strength">
            <div class="pw-seg" id="ps1"></div>
            <div class="pw-seg" id="ps2"></div>
            <div class="pw-seg" id="ps3"></div>
            <div class="pw-seg" id="ps4"></div>
          </div>
          <div class="pw-hint" id="pw-hint">Use 8+ characters</div>
        </div>
        <button class="submit-btn" id="su-btn" onclick="submitSignUp()">
          <div class="spinner"></div>
          <span class="btn-txt">Create Account</span>
        </button>
        <div class="terms-note">By creating an account you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</div>
      </div>

      <!-- RESET PASS form -->
      <div id="form-reset" style="display:none">
        <button class="reset-back" onclick="setMode(prevMode)">← Back</button>
        <div class="field">
          <label>Email</label>
          <input type="email" id="rs-email" placeholder="you@email.com" autocomplete="email">
        </div>
        <button class="submit-btn" id="rs-btn" onclick="submitReset()">
          <div class="spinner"></div>
          <span class="btn-txt">Send Reset Link</span>
        </button>
      </div>

      <div class="msg" id="auth-msg"></div>
    </div>
  </div>
</main>

<script>
// ══════════════════════════════════════════════════════
// ⚠️  FIREBASE CONFIG — replace with your project values
// Firebase Console → Project Settings → Your apps → Config
// ══════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId:             "YOUR_APP_ID",
};
// ══════════════════════════════════════════════════════

// Where to redirect after auth (pass ?next= in URL to override)
const params = new URLSearchParams(location.search);
const NEXT = params.get('next') || 'rep-legend-app.html';
const MODE_INIT = params.get('mode') === 'signup' ? 'signup' : 'signin';

let auth, googleProvider, mode = MODE_INIT, prevMode = 'signin';
let firebaseReady = false;

// Init Firebase (gracefully fails if config not set)
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  auth = firebase.auth();
  googleProvider = new firebase.auth.GoogleAuthProvider();
  firebaseReady = true;

  // Listen for auth state
  auth.onAuthStateChanged(user => {
    if (user) onAuthSuccess(user);
  });
} catch(e) {
  console.warn('Firebase not configured:', e.message);
}

setMode(MODE_INIT);

// ── MODE SWITCHING ──────────────────────────────────
function setMode(m) {
  prevMode = mode; mode = m;
  const isSignin = m === 'signin', isSignup = m === 'signup', isReset = m === 'reset';
  document.getElementById('form-signin').style.display = isSignin ? '' : 'none';
  document.getElementById('form-signup').style.display = isSignup ? '' : 'none';
  document.getElementById('form-reset').style.display  = isReset  ? '' : 'none';
  document.getElementById('btn-signin').classList.toggle('on', isSignin);
  document.getElementById('btn-signup').classList.toggle('on', isSignup);
  document.getElementById('card-title').textContent = isReset ? 'Reset password' : isSignup ? 'Create account' : 'Welcome back';
  document.getElementById('card-sub').textContent = isReset ? "We'll email you a reset link" : isSignup ? 'Sign up for Rep Legend' : 'Sign in to your Rep Legend account';
  document.getElementById('google-btn').style.display = isReset ? 'none' : '';
  document.querySelector('.divider').style.display = isReset ? 'none' : '';
  document.getElementById('auth-msg').textContent = '';
}

// ── GOOGLE SIGN-IN ──────────────────────────────────
async function googleSignIn() {
  if (!firebaseReady) { showMsg('Firebase not configured yet — add your config.', 'err'); return; }
  const btn = document.getElementById('google-btn');
  btn.classList.add('loading');
  btn.disabled = true;
  try {
    const result = await auth.signInWithPopup(googleProvider);
    onAuthSuccess(result.user);
  } catch(e) {
    showMsg(friendlyError(e.code), 'err');
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

// ── EMAIL SIGN-IN ───────────────────────────────────
async function submitSignIn() {
  const email = val('si-email'), pw = val('si-pw');
  if (!email || !pw) { showMsg('Please fill in all fields.', 'err'); return; }
  if (!firebaseReady) { demoSuccess('Welcome back!'); return; }
  const btn = document.getElementById('si-btn');
  setLoading(btn, true);
  try {
    const result = await auth.signInWithEmailAndPassword(email, pw);
    onAuthSuccess(result.user);
  } catch(e) {
    showMsg(friendlyError(e.code), 'err');
    setLoading(btn, false);
  }
}

// ── EMAIL SIGN-UP ───────────────────────────────────
async function submitSignUp() {
  const fname = val('su-fname'), lname = val('su-lname');
  const email = val('su-email'), pw = val('su-pw');
  if (!fname || !email || !pw) { showMsg('Please fill in all fields.', 'err'); return; }
  if (pw.length < 8) { showMsg('Password must be at least 8 characters.', 'err'); return; }
  if (!firebaseReady) { demoSuccess('Account created!'); return; }
  const btn = document.getElementById('su-btn');
  setLoading(btn, true);
  try {
    const result = await auth.createUserWithEmailAndPassword(email, pw);
    await result.user.updateProfile({ displayName: `${fname} ${lname}`.trim() });
    // Send verification email
    await result.user.sendEmailVerification();
    onAuthSuccess(result.user);
  } catch(e) {
    showMsg(friendlyError(e.code), 'err');
    setLoading(btn, false);
  }
}

// ── RESET PASSWORD ──────────────────────────────────
async function submitReset() {
  const email = val('rs-email');
  if (!email || !email.includes('@')) { showMsg('Enter a valid email.', 'err'); return; }
  if (!firebaseReady) { showMsg('Reset link sent! Check your inbox.', 'ok'); return; }
  const btn = document.getElementById('rs-btn');
  setLoading(btn, true);
  try {
    await auth.sendPasswordResetEmail(email);
    showMsg('Reset link sent! Check your inbox.', 'ok');
    setLoading(btn, false);
  } catch(e) {
    showMsg(friendlyError(e.code), 'err');
    setLoading(btn, false);
  }
}

// ── SUCCESS ─────────────────────────────────────────
function onAuthSuccess(user) {
  // Store minimal user info for app use
  try {
    localStorage.setItem('rl_user', JSON.stringify({
      uid: user.uid,
      name: user.displayName || user.email.split('@')[0],
      email: user.email,
      photo: user.photoURL || null,
    }));
  } catch(_) {}
  demoSuccess(user.displayName ? `Welcome, ${user.displayName.split(' ')[0]}!` : 'You\'re in!');
}

function demoSuccess(headline) {
  document.getElementById('auth-panel').style.display = 'none';
  const s = document.getElementById('success');
  s.style.display = 'block';
  document.getElementById('success-h').textContent = headline;
  document.getElementById('success-sub').textContent = mode === 'signup'
    ? 'Your account is ready. Time to become a Rep Legend.'
    : 'Good to have you back. Let\'s get to work.';
  document.getElementById('success-link').href = NEXT;
  // Auto-redirect after 2s
  setTimeout(() => { location.href = NEXT; }, 2000);
}

// ── HELPERS ─────────────────────────────────────────
function val(id) { return document.getElementById(id)?.value.trim() || ''; }
function showMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg; el.className = 'msg ' + (type || '');
}
function setLoading(btn, on) {
  btn.classList.toggle('loading', on); btn.disabled = on;
}

function checkPwStrength(pw) {
  const segs = ['ps1','ps2','ps3','ps4'];
  const hint = document.getElementById('pw-hint');
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const cls = score <= 1 ? 'weak' : score === 2 ? 'ok' : 'strong';
  const labels = ['','Too short','Weak — add numbers','Good','Strong ✓'];
  segs.forEach((id, i) => {
    const seg = document.getElementById(id);
    seg.className = 'pw-seg' + (i < score ? ' ' + cls : '');
  });
  hint.textContent = labels[score] || '';
  hint.style.color = cls === 'weak' ? 'var(--red)' : cls === 'ok' ? '#FFD60A' : 'var(--green)';
}

function friendlyError(code) {
  const map = {
    'auth/invalid-email': 'Invalid email address.',
    'auth/user-not-found': 'No account with that email. Try signing up.',
    'auth/wrong-password': 'Incorrect password. Try again or reset it.',
    'auth/email-already-in-use': 'An account with that email already exists. Sign in instead.',
    'auth/weak-password': 'Password must be at least 6 characters.',
    'auth/popup-closed-by-user': 'Sign-in popup was closed.',
    'auth/network-request-failed': 'Network error. Check your connection.',
    'auth/too-many-requests': 'Too many attempts. Try again in a few minutes.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}
</script>
</body>
</html>
